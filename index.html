<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="考研英语备考每日打卡 - 记录你的每一份努力">
  <title>考研英语 · 每日打卡</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <div class="header-inner">
        <h1 class="app-title">考研英语 <span class="title-sub">每日打卡</span></h1>
        <div class="header-actions">
          <button class="icon-btn" id="btnStats" title="统计概览" aria-label="统计">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
          </button>
          <button class="icon-btn" id="btnSettings" title="设置" aria-label="设置">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </div>
      <div class="date-display" id="dateDisplay"></div>
    </header>

    <!-- Main Content -->
    <main class="app-main">

      <!-- Today's Check-in -->
      <section class="card" id="todaySection">
        <div class="card-header">
          <h2>今日任务</h2>
          <span class="badge" id="progressBadge">0/0</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="todayProgress" style="width:0%"></div>
        </div>
        <div class="task-list" id="taskList">
          <!-- Tasks rendered by JS -->
        </div>
        <button class="btn btn-primary" id="btnCheckIn" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          完成打卡
        </button>
      </section>

      <!-- Streak & Stats Row -->
      <div class="stats-row">
        <div class="card stat-card">
          <div class="stat-value" id="streakCount">0</div>
          <div class="stat-label">连续打卡</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="totalDays">0</div>
          <div class="stat-label">累计天数</div>
        </div>
        <div class="card stat-card">
          <div class="stat-value" id="thisMonthCount">0</div>
          <div class="stat-label">本月打卡</div>
        </div>
      </div>

      <!-- Monthly Calendar -->
      <section class="card" id="calendarSection">
        <div class="card-header">
          <h2>打卡日历</h2>
          <div class="calendar-nav">
            <button class="icon-btn-sm" id="prevMonth" aria-label="上月">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
            </button>
            <span id="calendarMonth"></span>
            <button class="icon-btn-sm" id="nextMonth" aria-label="下月">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          </div>
        </div>
        <div class="calendar-grid" id="calendarGrid">
          <!-- Rendered by JS -->
        </div>
      </section>

      <!-- Learning Resources -->
      <section class="card" id="resourcesSection">
        <div class="card-header">
          <h2>学习资源</h2>
        </div>
        <div class="resource-grid" id="resourceGrid">
          <!-- Rendered by JS -->
        </div>
      </section>
    </main>

    <!-- Modal Overlay -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="statsModal">
        <div class="modal-header">
          <h2>统计概览</h2>
          <button class="icon-btn modal-close" id="closeStats" aria-label="关闭">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body" id="statsBody">
          <!-- Rendered by JS -->
        </div>
      </div>

      <div class="modal" id="settingsModal">
        <div class="modal-header">
          <h2>设置</h2>
          <button class="icon-btn modal-close" id="closeSettings" aria-label="关闭">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body" id="settingsBody">
          <!-- Rendered by JS -->
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
